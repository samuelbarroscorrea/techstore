<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro - TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">TechStore</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="menu">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="pagina2.html">Computadores</a></li>
                    <li class="nav-item"><a class="nav-link" href="pagina3.html">Periféricos</a></li>
                    <li class="nav-item"><a class="nav-link" href="pagina4.html">Promoções</a></li>
                    <li class="nav-item"><a class="nav-link" href="formulario.html">Cadastro</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h3 class="mb-4">Cadastro de Cliente</h3>

        <form action="index.html">

            <input class="form-control mb-2" type="text" placeholder="Nome Completo">
            <input class="form-control mb-2" type="text" placeholder="CPF">
            <input class="form-control mb-2" type="email" placeholder="E-mail">
            <input class="form-control mb-2" type="tel" placeholder="Telefone">

            <label class="form-label">Data de Nascimento</label>
            <input class="form-control mb-2" type="date">

            <input class="form-control mb-2" type="password" placeholder="Senha">

            <select class="form-select mb-2">
                <option>Estado</option>
                <option>MT</option>
                <option>SP</option>
                <option>RJ</option>
            </select>

            <select class="form-select mb-2">
                <option>Cidade</option>
                <option>Cuiabá</option>
                <option>São Paulo</option>
                <option>Rio de Janeiro</option>
            </select>

            <select class="form-select mb-2">
                <option>Categoria de Cliente</option>
                <option>Comum</option>
                <option>Premium</option>
                <option>VIP</option>
            </select>

            <label class="form-label">Sexo:</label><br>

            <div class="mb-2">
                <input type="radio" name="sexo"> Masculino
                <input type="radio" name="sexo"> Feminino
                <input type="radio" name="sexo"> Prefiro não informar
            </div>

            <label class="form-label">Interesses:</label><br>

            <div class="mb-2">
                <input type="checkbox"> Promoções
                <input type="checkbox"> Novidades
                <input type="checkbox"> Newsletter
                <input type="checkbox"> Eventos
            </div>

            <textarea class="form-control mb-2" rows="3" placeholder="Observações"></textarea>

            <label class="form-label">Nível de satisfação</label>
            <input class="form-range mb-2" type="range">

            <label class="form-label">Cor favorita</label>
            <input class="form-control form-control-color mb-2" type="color">

            <label class="form-label">Enviar foto</label>
            <input class="form-control mb-3" type="file">

            <button type="submit" class="btn btn-primary">Enviar</button>
            <button type="reset" class="btn btn-secondary">Limpar</button>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
